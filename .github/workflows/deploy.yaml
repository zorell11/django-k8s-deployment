name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          platforms: linux/amd64
          push: true
          # Use commit SHA as a unique tag to prevent image caching issues
          tags: zorell/django-k8s:${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Update the image tag in deployment.yaml to the latest commit SHA
            # Ensure the path k8s/deployment.yaml matches your actual file structure
            sed -i "s|image: zorell/django-k8s:.*|image: zorell/django-k8s:${{ github.sha }}|g" k8s/deployment.yaml

            # 2. Apply the updated configuration to the Kubernetes cluster
            kubectl apply -f k8s/deployment.yaml

            # 3. Force a rolling restart to pull the new image version
            kubectl rollout restart deployment django-app
